# Grafana datasource configuration
# Auto-provisions Prometheus + Loki as datasources on Grafana startup.
# uids are hardcoded by the provisioned dashboards — do not change them.

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    version: 1

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    version: 1
