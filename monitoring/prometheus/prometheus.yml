# Prometheus configuration for finance-query monitoring
global:
  scrape_interval: 15s      # Scrape targets every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'finance-query'
    environment: 'production'

# Load alert rules
rule_files:
  - "alerts/*.yml"

# Route fired alerts to Alertmanager (webhook notifications)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Scrape finance-query V2 (Rust server)
  - job_name: 'finance-query-v2'
    scrape_interval: 10s  # More frequent for API metrics
    metrics_path: '/v2/metrics'
    static_configs:
      - targets: ['finance-query-v2:8000']
        labels:
          service: 'finance-query-v2'
          version: 'v2'
          language: 'rust'
    # Relabel to add more context
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'finance-query-v2'

  # Scrape finance-query V1 (legacy Python server, passively monitored)
  - job_name: 'finance-query-v1'
    metrics_path: '/v1/metrics'
    static_configs:
      - targets: ['finance-query-v1:8000']
        labels:
          service: 'finance-query-v1'
          version: 'v1'
          language: 'python'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'finance-query-v1'

  # Scrape MCP server
  - job_name: 'finance-query-mcp'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['finance-query-mcp:3000']
        labels:
          service: 'finance-query-mcp'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'finance-query-mcp'

  # Scrape Redis (via redis-exporter)
  - job_name: 'redis'
    scrape_interval: 15s
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'

  # Scrape Alertmanager itself
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: 'alertmanager'

  # Scrape Loki (log aggregation)
  - job_name: 'loki'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'
