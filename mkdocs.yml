site_name: Finance Query
site_url: https://verdenroz.github.io/finance-query/
site_author: Harvey Tseng
site_description: Rust library, CLI, and server for financial data

# Exclude local tooling working-files that may live under docs/ but are not pages
exclude_docs: |
  superpowers/

repo_url: https://github.com/Verdenroz/finance-query
repo_name: Verdenroz/finance-query

theme:
  favicon: assets/logo.png
  logo: assets/logo.png
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.top

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Library:
      - Getting Started: library/getting-started.md
      - Ticker: library/ticker.md
      - Batch Tickers: library/tickers.md
      - Real-time Streaming: library/streaming.md
      - Finance Module: library/finance.md
      - Screeners: library/screeners.md
      - Providers:
          - Overview: library/providers/index.md
          - Polygon.io: library/providers/polygon.md
          - FMP: library/providers/fmp.md
          - Alpha Vantage: library/providers/alphavantage.md
          - CoinGecko: library/providers/coingecko.md
          - EDGAR: library/providers/edgar.md
          - FRED: library/providers/fred.md
      - Domains:
          - Crypto: library/crypto.md
          - Forex: library/forex.md
          - Futures: library/futures.md
          - Indices: library/indices.md
          - Commodities: library/commodities.md
          - Economic: library/economic.md
          - Filings: library/filings.md
      - Risk Analytics: library/risk.md
      - Translations: library/translation.md
      - Feeds: library/feeds.md
      - DataFrame Support: library/dataframe.md
      - Configuration: library/configuration.md
      - Error Handling: library/error-handling.md
      - Indicators: library/indicators.md
      - Backtesting: library/backtesting.md
  - CLI:
      - Installation & Quick Start: cli/installation.md
      - Commands: cli/commands.md
      - Examples: cli/examples.md
  - Server:
      - REST API Reference: server/api-reference.md
      - WebSocket API Reference: server/websocket-api-reference.md
      - GraphQL API Reference: server/graphql-api-reference.md
      - MCP Tools Reference: server/mcp-reference.md
  - Development:
      - Contributing: development/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Verdenroz/finance-query
