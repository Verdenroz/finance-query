name: Publish to crates.io

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # Run tests before publishing
  test:
    name: Pre-publish Tests
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run tests
        run: cargo test --all-features --verbose

  # Publish to crates.io via OIDC trusted publishing (no long-lived token).
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      id-token: write # mint a short-lived crates.io token via OIDC
      contents: write # create the GitHub Release
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Verify version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Authenticate to crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish finance-query-derive
        run: cargo publish -p finance-query-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io to index
        run: sleep 30

      - name: Publish finance-query
        run: cargo publish -p finance-query
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Extract CHANGELOG for this version
        id: changelog
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          CHANGELOG_CONTENT=$(bash .github/scripts/extract_changelog.sh "$TAG_VERSION" CHANGELOG.md || echo "")
          if [ -z "$CHANGELOG_CONTENT" ]; then
            echo "No CHANGELOG entry found for version $TAG_VERSION, using auto-generated notes"
            echo "use_auto=true" >> $GITHUB_OUTPUT
          else
            echo "use_auto=false" >> $GITHUB_OUTPUT
            # Save to file to preserve formatting
            echo "$CHANGELOG_CONTENT" > /tmp/release_notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          USE_AUTO: ${{ steps.changelog.outputs.use_auto }}
        run: |
          if [ "$USE_AUTO" = "true" ]; then
            gh release create "$TAG" --verify-tag --generate-notes
          else
            gh release create "$TAG" --verify-tag --notes-file /tmp/release_notes.md
          fi
