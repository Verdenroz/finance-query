name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # Check code formatting
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Run clippy linter
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Run all tests — retries only failed tests with exponential backoff to handle rate limiting
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: nextest
      - name: Run unit tests (all features)
        run: cargo nextest run --workspace --all-features
      - name: Run network integration tests
        run: cargo nextest run --workspace --profile ci-network --run-ignored ignored-only
      - name: Run doctests
        run: cargo test --workspace --doc --all-features

  # Check compilation
  check:
    name: Check Build
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check build
        run: cargo check --all-features --verbose

  # Build release binary
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, check]
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # cargo-auditable embeds the dependency manifest into each binary so the
      # shipped artifacts can be scanned later with `cargo audit bin`.
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-auditable
      # The root crate is a library; the shippable binaries live in the
      # workspace members, so build the whole workspace.
      - name: Build release binaries
        run: cargo auditable build --workspace --release --verbose
      - name: Upload binaries
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: finance-query-linux-x86_64
          path: |
            target/release/finance-query-server
            target/release/fq
            target/release/fq-mcp
          if-no-files-found: error

  # Build and test Docker image
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, check]
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to code scanning
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: server/Dockerfile
          push: false
          load: true
          tags: financequery:v2-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Test Docker image
        run: |
          docker run -d --name test-container -p 8000:8000 financequery:v2-ci
          sleep 5
          docker exec test-container curl -f http://localhost:8000/v2/health || true
          docker stop test-container
          docker rm test-container
      # Trivy reads OS-package CVEs AND the cargo-auditable manifest embedded in
      # the binary, so the shipped artifact is actually scanned (not just built).
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: financequery:v2-ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
      - name: Upload Trivy results to code scanning
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-server

  # Build and test MCP Docker image
  docker-mcp:
    name: MCP Docker Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, check]
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to code scanning
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build MCP Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: finance-query-mcp/Dockerfile
          push: false
          load: true
          tags: financequery:mcp-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Test MCP Docker image
        run: |
          docker run -d --name test-mcp -p 3000:3000 -e MCP_TRANSPORT=http financequery:mcp-ci
          sleep 10
          curl -f http://localhost:3000/health
          docker stop test-mcp
          docker rm test-mcp
      # Trivy reads OS-package CVEs AND the cargo-auditable manifest embedded in
      # the binary, so the shipped artifact is actually scanned (not just built).
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: financequery:mcp-ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
      - name: Upload Trivy results to code scanning
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-mcp
