name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # Decide which downstream jobs this change set actually needs, so
  # docs-only / single-crate PRs don't pay for work that can't have broken.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      server_docker: ${{ steps.filter.outputs.server_docker }}
      mcp_docker: ${{ steps.filter.outputs.mcp_docker }}
      fuzz: ${{ steps.filter.outputs.fuzz }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'server/**'
              - 'finance-query-cli/**'
              - 'finance-query-mcp/**'
              - 'finance-query-derive/**'
              - 'benches/**'
              - 'tests/**'
              - 'fuzz/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            server_docker:
              - 'src/**'
              - 'server/**'
              - 'finance-query-derive/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            mcp_docker:
              - 'src/**'
              - 'finance-query-mcp/**'
              - 'finance-query-derive/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            fuzz:
              - 'src/**'
              - 'fuzz/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # Check code formatting
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Run clippy linter
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `full` = all features except translation-offline, which compiles
      # CTranslate2 from source; the Docker jobs cover that build instead.
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --features finance-query/full -- -D warnings

  test-unit:
    name: Test Suite (unit)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: v0-rust-test-suite
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: nextest
      # `full` = all features except translation-offline (heavy CTranslate2
      # native build; compilation is covered by the Docker jobs).
      - name: Run unit tests (full features)
        run: cargo nextest run --workspace --features finance-query/full

  test-network:
    name: Test Suite (network)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: v0-rust-test-suite
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: nextest
      - name: Run network integration tests
        run: cargo nextest run --workspace --profile ci-network --run-ignored ignored-only

  test-doctest:
    name: Test Suite (doctest)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: v0-rust-test-suite
      # `full` = all features except translation-offline (heavy CTranslate2
      # native build; compilation is covered by the Docker jobs).
      - name: Run doctests
        run: cargo test --workspace --doc --features finance-query/full

  # Required-status-check name preserved as "Test Suite" (branch protection
  # references this exact context) even though the real work now runs as
  # three parallel jobs above. `always()` + explicit result-checking is
  # required here — without it, a real sub-job failure would leave this
  # aggregator skipped-by-cascade instead of failed, and GitHub treats a
  # skipped required check as passing.
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [changes, test-unit, test-network, test-doctest]
    if: always() && needs.changes.outputs.rust == 'true'
    steps:
      - name: Check suite results
        run: |
          for result in "${{ needs.test-unit.result }}" "${{ needs.test-network.result }}" "${{ needs.test-doctest.result }}"; do
            if [ "$result" != "success" ]; then
              echo "A test suite did not succeed: $result"
              exit 1
            fi
          done

  # Check compilation
  check:
    name: Check Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `full` = all features except translation-offline (heavy CTranslate2
      # native build; compilation is covered by the Docker jobs).
      - name: Check build
        run: cargo check --workspace --features finance-query/full --verbose

  # Build release binary
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [fmt, clippy, check]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # cargo-auditable embeds the dependency manifest into each binary so the
      # shipped artifacts can be scanned later with `cargo audit bin`.
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: cargo-auditable
      # The root crate is a library; the shippable binaries live in the
      # workspace members, so build the whole workspace.
      - name: Build release binaries
        run: cargo auditable build --workspace --release --verbose
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: finance-query-linux-x86_64
          path: |
            target/release/finance-query-server
            target/release/fq
            target/release/fq-mcp
          if-no-files-found: error

  # Build and test Docker image
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [changes, fmt, clippy, check]
    if: needs.changes.outputs.server_docker == 'true'
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to code scanning
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: server/Dockerfile
          push: false
          load: true
          tags: financequery:v2-ci
          cache-from: type=gha,scope=docker-server
          cache-to: type=gha,mode=max,scope=docker-server
      - name: Test Docker image
        run: |
          docker run -d --name test-container -p 8000:8000 financequery:v2-ci
          sleep 5
          docker exec test-container curl -f http://localhost:8000/v2/health || true
          docker stop test-container
          docker rm test-container
      # Trivy reads OS-package CVEs AND the cargo-auditable manifest embedded in
      # the binary, so the shipped artifact is actually scanned (not just built).
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: financequery:v2-ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
      - name: Upload Trivy results to code scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-server

  # Build and test MCP Docker image
  docker-mcp:
    name: MCP Docker Build
    runs-on: ubuntu-latest
    needs: [changes, fmt, clippy, check]
    if: needs.changes.outputs.mcp_docker == 'true'
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to code scanning
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build MCP Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: finance-query-mcp/Dockerfile
          push: false
          load: true
          tags: financequery:mcp-ci
          cache-from: type=gha,scope=docker-mcp
          cache-to: type=gha,mode=max,scope=docker-mcp
      - name: Test MCP Docker image
        run: |
          docker run -d --name test-mcp -p 3000:3000 -e MCP_TRANSPORT=http financequery:mcp-ci
          sleep 10
          curl -f http://localhost:3000/health
          docker stop test-mcp
          docker rm test-mcp
      # Trivy reads OS-package CVEs AND the cargo-auditable manifest embedded in
      # the binary, so the shipped artifact is actually scanned (not just built).
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: financequery:mcp-ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
      - name: Upload Trivy results to code scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-mcp

  # Fuzz testing — builds all targets on nightly and runs each for a short
  # burst to catch panics on malformed JSON and edge-case arithmetic inputs.
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.fuzz == 'true'
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz -> target
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Build fuzz targets
        run: cargo fuzz build --dev
        working-directory: fuzz
      - name: Run fuzz_quote (30 s)
        run: cargo fuzz run fuzz_quote -- -max_total_time=30
        working-directory: fuzz
      - name: Run fuzz_chart (30 s)
        run: cargo fuzz run fuzz_chart -- -max_total_time=30
        working-directory: fuzz
      - name: Run fuzz_atr (30 s)
        run: cargo fuzz run fuzz_atr -- -max_total_time=30
        working-directory: fuzz
      - name: Run fuzz_indicators_series (30 s)
        run: cargo fuzz run fuzz_indicators_series -- -max_total_time=30
        working-directory: fuzz
      - name: Run fuzz_indicators_ohlcv (30 s)
        run: cargo fuzz run fuzz_indicators_ohlcv -- -max_total_time=30
        working-directory: fuzz
      - name: Run fuzz_patterns (30 s)
        run: cargo fuzz run fuzz_patterns -- -max_total_time=30
        working-directory: fuzz
      - name: Run fuzz_options (30 s)
        run: cargo fuzz run fuzz_options -- -max_total_time=30
        working-directory: fuzz
      - name: Run fuzz_financials (30 s)
        run: cargo fuzz run fuzz_financials -- -max_total_time=30
        working-directory: fuzz
      - name: Run fuzz_edgar (30 s)
        run: cargo fuzz run fuzz_edgar -- -max_total_time=30
        working-directory: fuzz
      - name: Run fuzz_discovery (30 s)
        run: cargo fuzz run fuzz_discovery -- -max_total_time=30
        working-directory: fuzz
