name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: V2 (Rust)
            context: .
            file: server/Dockerfile
            suffix: v2
            # translation-offline disabled temporarily
            build-args: CARGO_FEATURES=translation
          - name: V1 (Python)
            context: v1
            file: v1/Dockerfile
            suffix: v1
            build-args: ""
          - name: MCP
            context: .
            file: finance-query-mcp/Dockerfile
            suffix: mcp
            # translation-offline disabled temporarily
            build-args: CARGO_FEATURES=translation

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          build-args: ${{ matrix.image.build-args }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image.suffix }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image.suffix }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.suffix }}

  deploy-docs:
    name: Deploy MkDocs to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # gh-deploy pushes to gh-pages, so this checkout needs its credentials.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: "docs/requirements.txt"

      - name: Install docs dependencies
        run: pip install --require-hashes -r docs/requirements.txt

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions: {}
    # Only deploy on master branch pushes, not PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Deploy via SSH
        uses: appleboy/ssh-action@823bd89e131d8d508129f9443cad5855e9ba96f0 # v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/finance-query
            set -a; . ./.env 2>/dev/null || true; set +a
            IMAGE_BASE="ghcr.io/${GITHUB_REPO:-verdenroz/finance-query}"
            PREV_SHA=$(git rev-parse HEAD)

            check_health() {
              curl -f http://localhost/v2/health \
                && curl -f http://localhost/v1/health \
                && curl -f http://localhost/mcp/health
            }

            # Pin the on-disk checkout to the exact commit being deployed —
            # an out-of-band sync can otherwise leave docker-compose.prod.yml
            # stale relative to the images this job just pushed.
            git fetch origin master
            git checkout --force ${{ github.sha }}

            # docker-compose.prod.yml is an overlay on docker-compose.yml
            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            # Deploy with zero-downtime
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Verify deployment; roll back to the previous SHA's images on failure.
            sleep 10
            if ! check_health; then
              echo "Health check failed for ${{ github.sha }}, rolling back to $PREV_SHA"
              git checkout --force "$PREV_SHA"
              for svc in v2 v1 mcp; do
                docker pull "$IMAGE_BASE/$svc:$PREV_SHA"
                docker tag "$IMAGE_BASE/$svc:$PREV_SHA" "$IMAGE_BASE/$svc:latest"
              done
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
              sleep 10
              check_health
              exit 1
            fi

            # Cleanup old images
            docker image prune -f
