name: Security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Re-run weekly so newly disclosed advisories surface even without a push.
    - cron: "20 7 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  # Dependency supply-chain checks: advisories, banned crates, license policy,
  # and allowed sources (typosquat / dependency-confusion defense).
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19
        with:
          command: check advisories bans licenses sources

  # Static analysis of the GitHub Actions workflows themselves.
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      contents: read
      actions: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
