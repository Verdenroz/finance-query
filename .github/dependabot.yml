version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    target-branch: "master"
    assignees:
      - "Verdenroz"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "UTC"
    target-branch: "master"
    assignees:
      - "Verdenroz"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  # Keep the digest-pinned base images in the Rust Dockerfiles current.
  - package-ecosystem: "docker"
    directories:
      - "/server"
      - "/finance-query-mcp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    target-branch: "master"
    assignees:
      - "Verdenroz"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "docker"
