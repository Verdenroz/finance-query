# Production overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  caddy:
    environment:
      - MONITORING_PASSWORD=${MONITORING_PASSWORD:?MONITORING_PASSWORD required}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true

  # V2 Rust Server
  finance-query-v2:
    image: ghcr.io/${GITHUB_REPO:-verdenroz/finance-query}/v2:latest
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      # Persists per-language opus-mt models (~80–210 MB each, under $HF_HOME/argos)
      # across container recreates/deploys so they download only once.
      - hf-cache-v2:/home/appuser/.cache/huggingface
    deploy:
      resources:
        limits:
          # Translation inference is CPU-bound: the offline backend uses up to
          # 8 intra-op threads, and CTranslate2 holds one small int8 opus-mt
          # model (~80-210 MB each) per requested language in memory. CPU
          # headroom matters more than RAM — a full transcript translates in
          # ~2-4 s at 6 CPUs (vs tens of seconds with fewer).
          cpus: "6.0"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # MCP Server (HTTP streaming transport for AI agents)
  finance-query-mcp:
    image: ghcr.io/${GITHUB_REPO:-verdenroz/finance-query}/mcp:latest
    expose:
      - "3000"
    volumes:
      # Persists per-language opus-mt models (~80–210 MB each, under $HF_HOME/argos)
      # across container recreates/deploys so they download only once.
      - hf-cache-mcp:/home/appuser/.cache/huggingface
    deploy:
      resources:
        limits:
          # The MCP image is built with translation-offline too: tool calls
          # with a `lang` param load a small per-language opus-mt model
          # in-process (~80-210 MB each).
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # V1 Python Server
  finance-query-v1:
    image: ghcr.io/${GITHUB_REPO:-verdenroz/finance-query}/v1:latest
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Redis (internal only)
  redis:
    user: "999:999" # Redis user
    read_only: true
    tmpfs:
      - /tmp
    # Redis is used purely as a cache (data is reconstructable from upstream APIs),
    # so persistence is disabled. This prevents the AOF/RDB from growing unbounded
    # or blocking writes (stop-writes-on-bgsave-error) when disk is low.
    command: >
      sh -c "redis-server
      --appendonly no
      --save ''
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Redis Exporter for Prometheus metrics
  redis-exporter:
    user: "59000:59000" # Non-root user
    read_only: true
    expose:
      - "9121"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 16M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Host metrics (disk/memory/CPU)
  node-exporter:
    read_only: true
    expose:
      - "9100"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 16M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Prometheus
  prometheus:
    user: "65534:65534" # nobody user
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - "9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=8GB"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Alertmanager
  alertmanager:
    user: "65534:65534" # nobody user
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - "9093"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Loki (log aggregation)
  loki:
    user: "10001:10001" # loki user
    read_only: true
    expose:
      - "3100"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Promtail (ships container logs to Loki)
  promtail:
    read_only: true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # No healthcheck: the promtail image ships no shell utilities to probe with.

  # Grafana
  grafana:
    user: "472:472" # Grafana user
    # read_only disabled for Grafana - needs write access for plugins/logs
    expose:
      - "3000"
    environment:
      # Admin credentials (REQUIRED - no fallback)
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER required}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Security hardening
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  # Frontend network - only Caddy + app servers
  frontend:
    driver_opts:
      com.docker.network.bridge.name: br-frontend
  # Backend network - app servers + Redis
  backend:
    driver_opts:
      com.docker.network.bridge.name: br-backend
  # Monitoring network - Prometheus + exporters + Grafana
  monitoring:
    driver_opts:
      com.docker.network.bridge.name: br-monitoring

volumes:
  # Hugging Face model caches (one per service: hf-hub's cache layout is not
  # designed for concurrent writers, so v2 and MCP each get their own).
  hf-cache-v2:
  hf-cache-mcp:
