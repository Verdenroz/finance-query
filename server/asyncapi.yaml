asyncapi: 2.6.0
info:
  title: Finance Query Streaming API
  version: 2.8.0
  description: |
    Real-time price streaming from Yahoo Finance, and continuous RSS/Atom feed
    streaming, both via WebSocket.

    ## Price stream connection flow (`/v2/stream`)
    1. Connect to the WebSocket endpoint
    2. Send a subscribe message with ticker symbols
    3. Receive real-time price updates as they occur

    ## Feed stream connection flow (`/v2/feeds/stream`)
    1. Connect to the WebSocket endpoint
    2. Send a subscribe message with feed source slugs (same slugs accepted by
       `GET /v2/feeds`)
    3. Receive newly-seen feed entries as the server polls each source

    RSS/Atom has no push transport of its own, so the feed stream polls every
    5 minutes and fans out only entries not seen before (deduplicated by URL)
    — unlike the price stream, which is genuinely push end to end.

servers:
  production:
    url: finance-query.com/v2/stream
    protocol: wss
    description: Production server (price stream)
  development:
    url: localhost:8000/v2/stream
    protocol: ws
    description: Local development server (price stream)
  feedsProduction:
    url: finance-query.com/v2/feeds/stream
    protocol: wss
    description: Production server (feed stream)
  feedsDevelopment:
    url: localhost:8000/v2/feeds/stream
    protocol: ws
    description: Local development server (feed stream)

channels:
  /:
    servers: [production, development]
    publish:
      operationId: sendMessage
      summary: Send messages to the server
      message:
        oneOf:
          - $ref: '#/components/messages/Subscribe'
          - $ref: '#/components/messages/Unsubscribe'
    subscribe:
      operationId: receiveMessage
      summary: Receive price updates from the server
      message:
        $ref: '#/components/messages/PriceUpdate'

  /feeds:
    servers: [feedsProduction, feedsDevelopment]
    publish:
      operationId: sendFeedMessage
      summary: Send messages to the server
      message:
        oneOf:
          - $ref: '#/components/messages/FeedSubscribe'
          - $ref: '#/components/messages/FeedUnsubscribe'
    subscribe:
      operationId: receiveFeedEntry
      summary: Receive new feed entries from the server
      message:
        $ref: '#/components/messages/FeedEntryMessage'

components:
  messages:
    Subscribe:
      name: subscribe
      title: Subscribe Message
      summary: Subscribe to ticker symbols
      contentType: application/json
      payload:
        type: object
        required:
          - subscribe
        properties:
          subscribe:
            type: array
            items:
              type: string
            description: List of ticker symbols to subscribe to
            example:
              - AAPL
              - NVDA
              - BTC-USD

    Unsubscribe:
      name: unsubscribe
      title: Unsubscribe Message
      summary: Unsubscribe from ticker symbols
      contentType: application/json
      payload:
        type: object
        required:
          - unsubscribe
        properties:
          unsubscribe:
            type: array
            items:
              type: string
            description: List of ticker symbols to unsubscribe from
            example:
              - AAPL

    PriceUpdate:
      name: priceUpdate
      title: Price Update
      summary: Real-time price update
      contentType: application/json
      payload:
        $ref: '#/components/schemas/PriceUpdate'

    FeedSubscribe:
      name: subscribe
      title: Subscribe Message
      summary: Subscribe to feed sources
      contentType: application/json
      payload:
        type: object
        required:
          - subscribe
        properties:
          subscribe:
            type: array
            items:
              type: string
            description: >-
              List of feed source slugs to subscribe to (same slugs as
              `GET /v2/feeds`'s `sources` param).
            example:
              - bloomberg
              - marketwatch
          formType:
            type: string
            description: SEC filing form type, used when sec-filings is in subscribe
            example: 8-K

    FeedUnsubscribe:
      name: unsubscribe
      title: Unsubscribe Message
      summary: Unsubscribe from feed sources
      contentType: application/json
      payload:
        type: object
        required:
          - unsubscribe
        properties:
          unsubscribe:
            type: array
            items:
              type: string
            description: List of feed source slugs to unsubscribe from
            example:
              - bloomberg

    FeedEntryMessage:
      name: feedEntry
      title: Feed Entry
      summary: A newly-seen RSS/Atom feed entry
      contentType: application/json
      payload:
        $ref: '#/components/schemas/FeedEntry'

  schemas:
    PriceUpdate:
      type: object
      description: Real-time price update from Yahoo Finance
      properties:
        id:
          type: string
          description: Ticker symbol
          example: BTC-USD
        price:
          type: number
          format: float
          description: Current price
          example: 87690.22
        time:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
          example: 1735364458000
        currency:
          type: string
          description: Currency code
          example: USD
        exchange:
          type: string
          description: Exchange code
          example: CCC
        quoteType:
          $ref: '#/components/schemas/QuoteType'
        marketHours:
          $ref: '#/components/schemas/MarketHoursType'
        changePercent:
          type: number
          format: float
          description: Percent change from previous close
        dayVolume:
          type: integer
          format: int64
          description: Day's trading volume
        dayHigh:
          type: number
          format: float
          description: Day's high price
        dayLow:
          type: number
          format: float
          description: Day's low price
        change:
          type: number
          format: float
          description: Price change from previous close
        shortName:
          type: string
          description: Short name/description
        openPrice:
          type: number
          format: float
          description: Opening price
        previousClose:
          type: number
          format: float
          description: Previous close price
        bid:
          type: number
          format: float
          description: Bid price
        bidSize:
          type: integer
          format: int64
          description: Bid size
        ask:
          type: number
          format: float
          description: Ask price
        askSize:
          type: integer
          format: int64
          description: Ask size
        marketCap:
          type: number
          format: double
          description: Market capitalization

    QuoteType:
      type: string
      description: Type of financial instrument
      enum:
        - NONE
        - ALT_SYMBOL
        - HEARTBEAT
        - EQUITY
        - INDEX
        - MUTUAL_FUND
        - MONEY_MARKET
        - OPTION
        - CURRENCY
        - WARRANT
        - BOND
        - FUTURE
        - ETF
        - COMMODITY
        - ECN_QUOTE
        - CRYPTOCURRENCY
        - INDICATOR
        - INDUSTRY

    MarketHoursType:
      type: string
      description: Market hours indicator
      enum:
        - PRE_MARKET
        - REGULAR_MARKET
        - POST_MARKET
        - EXTENDED_HOURS_MARKET

    OptionType:
      type: string
      description: Option type (for options contracts)
      enum:
        - CALL
        - PUT

    FeedEntry:
      type: object
      description: A single entry from an RSS/Atom feed
      properties:
        title:
          type: string
        url:
          type: string
          format: uri
        published:
          type: string
          format: date-time
          nullable: true
        summary:
          type: string
          nullable: true
        source:
          type: string
